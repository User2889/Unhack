<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>💰</title>

<style>
:root{
    --bg:#031926;
    --card:rgba(0,70,100,.25);
    --accent:#00c6ff;
    --accent2:#00ffd5;
    --text:#e8fcff;
}

*{box-sizing:border-box}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    user-select:none;
    color:var(--text);
    font-family:"Segoe UI",Arial,sans-serif;
    background:
        radial-gradient(circle at 50% 0%,#0ea5e9 0%,transparent 40%),
        linear-gradient(to bottom,#0c4a6e,#082f49,#031926);
}

.blob{
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    z-index:-1;
    animation:f 10s ease-in-out infinite;
}

.b1{
    width:280px;
    height:280px;
    background:#0ea5e9;
    top:-60px;
    left:-60px;
}

.b2{
    width:340px;
    height:340px;
    background:#06b6d4;
    right:-120px;
    top:30%;
    animation-delay:-3s;
}

.b3{
    width:260px;
    height:260px;
    background:#14b8a6;
    bottom:-70px;
    left:25%;
    animation-delay:-6s;
}

@keyframes f{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-25px)}
}

.card{
    min-width:380px;
    text-align:center;
    padding:45px;
    border-radius:30px;
    background:var(--card);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:
        0 0 50px rgba(0,198,255,.25),
        inset 0 0 30px rgba(255,255,255,.08);
}

#money{
    font-size:82px;
    font-weight:900;
    margin-bottom:30px;
    background:linear-gradient(#fff,#8ef9ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:
        0 0 15px rgba(0,255,213,.6),
        0 0 35px rgba(0,198,255,.5);
}

button{
    border:none;
    color:white;
    cursor:pointer;
    font-size:22px;
    font-weight:800;
    padding:14px 28px;
    border-radius:14px;
    margin:8px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    transition:.2s;
    box-shadow:0 8px 20px rgba(0,198,255,.35);
}

button:hover{
    transform:translateY(-3px);
}

#warning{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(8px);
    color:#ff8080;
    font-size:48px;
    font-weight:900;
    z-index:999;
}

#unlock{
    position:fixed;
    right:10px;
    bottom:10px;
    width:24px;
    height:24px;
    opacity:0;
    background:transparent;
    border:none;
}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="card">
    <div id="money">$0</div>

    <button id="plus">+</button>
    <button id="minus">−</button>
</div>

<button id="unlock" aria-label="unlock"></button>

<div id="warning">LOCKED</div>

<script>
(()=>{

const PASSWORD_HINT="68-85-67-75"; // DUCK (decoy)

const _0=[71,73,84];
const _1=[72,85,66];
const _2=[73,83,72];
const _3=[65,82,68];

const _4=[..._0,..._1,..._2,..._3]
.map(v=>String.fromCharCode(v))
.join("");

const _$=s=>(s||"").toLowerCase()===_4.toLowerCase();

const m=document.getElementById("money");
const w=document.getElementById("warning");

let n=parseInt(localStorage.getItem("money"))||0;
let u=false;
let t=null;

const sv=()=>localStorage.setItem("money",n);

const rn=()=>{
    m.textContent="$"+n;
};

const lk=()=>{
    w.style.display="flex";
    setTimeout(()=>w.style.display="none",1000);
};

const fu=()=>parseInt(localStorage.getItem("failures")||"0");

const lu=()=>parseInt(localStorage.getItem("lockUntil")||"0");

const lo=()=>Date.now()<lu();

const rs=()=>Math.ceil((lu()-Date.now())/1000);

document.getElementById("unlock").onclick=()=>{

    if(lo()){
        alert("Try again in "+rs()+" seconds.");
        return;
    }

    const p=prompt("Password:");

    if(_$(p)){

        u=true;

        localStorage.setItem("failures","0");

        if(t)clearTimeout(t);

        t=setTimeout(()=>{
            u=false;
        },10000);

        alert("Unlocked for 10 seconds");
        return;
    }

    const f=fu()+1;

    localStorage.setItem("failures",f);

    localStorage.setItem(
        "lockUntil",
        Date.now()+f*60000
    );

    alert(
        "Incorrect password. Locked for "+
        f+
        " minute(s)."
    );
};

document.getElementById("plus").onclick=()=>{
    if(!u){lk();return;}
    n++;
    sv();
    rn();
};

document.getElementById("minus").onclick=()=>{
    if(!u){lk();return;}
    n--;
    sv();
    rn();
};

rn();

})();
</script>

</body>
</html>
