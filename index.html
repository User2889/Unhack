<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Counter</title>
<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#a{
    text-align:center;
}
#b{
    font-size:60px;
    margin:20px;
}
button{
    padding:12px 25px;
    margin:5px;
    font-size:18px;
    cursor:pointer;
}
#r{
    position:fixed;
    inset:0;
    background:red;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="a">
    <div id="b">$0</div>
    <button id="u">Unlock</button>
    <button id="p">+</button>
    <button id="m">-</button>
</div>

<div id="r">UNLOCK FIRST</div>

<script>
(()=>{

let q=0,
    k=0,
    d=document,
    z=d.getElementById.bind(d),
    v=z("b"),
    x=z("r");

const h=()=>v.textContent="$"+q;

const n=()=>{
    x.style.display="flex";
    setTimeout(()=>x.style.display="none",1000);
};

z("u").onclick=()=>{
    let t=prompt("Type 'unlock'");
    k=(t||"").toLowerCase()==="unlock";
    if(k) alert("Unlocked");
};

z("p").onclick=()=>{
    k?(q++,h()):n();
};

z("m").onclick=()=>{
    k?(q--,h()):n();
};

h();

})();
</script>

</body>
</html>
