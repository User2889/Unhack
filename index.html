<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Vault</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
    background:#000;
    color:white;
}

.space{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, #1a1f3c, transparent 40%),
        radial-gradient(circle at 80% 70%, #2b0f3a, transparent 45%),
        radial-gradient(circle at center, #050816, #000);
}

.star{
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle,#fff,transparent);
    animation:floatStar linear infinite;
    opacity:.5;
}

@keyframes floatStar{
    from{ transform:translateY(0); opacity:.3; }
    to{ transform:translateY(-120vh); opacity:.8; }
}

.hud{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    padding:45px;
    border-radius:22px;
    background:rgba(10,15,30,.55);
    backdrop-filter:blur(14px);
    box-shadow:0 0 60px rgba(180,200,255,.15);
}

#money{
    font-size:64px;
    margin-bottom:25px;
    text-shadow:0 0 25px rgba(180,220,255,.9);
}

.btn{
    padding:14px 30px;
    margin:10px;
    font-size:18px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    transition:.2s ease;
    font-family:'Orbitron',sans-serif;
}

.plus{
    background:linear-gradient(135deg,#ffd6ff,#caffbf);
    box-shadow:0 0 25px rgba(255,214,255,.5),
                0 0 45px rgba(202,255,191,.4);
}

.minus{
    background:linear-gradient(135deg,#a0c4ff,#bdb2ff);
    box-shadow:0 0 25px rgba(160,196,255,.5),
                0 0 45px rgba(189,178,255,.4);
}

.btn:hover{
    transform:scale(1.1);
    filter:brightness(1.2);
}

#lockScreen{
    position:fixed;
    inset:0;
    background:rgba(139,0,0,.95);
    display:none;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:600;
    z-index:999;
    text-align:center;
    color:white;
}

.sparkle{
    position:absolute;
    width:10px;
    height:10px;
    background:radial-gradient(circle,white,transparent);
    border-radius:50%;
    pointer-events:none;
    animation:sparkle .8s ease-out forwards;
}

@keyframes sparkle{
    0%{ transform:scale(1); opacity:1; }
    100%{ transform:scale(3); opacity:0; }
}

#unlockBtn{
    position:absolute;
    top:10px;
    right:10px;
    width:60px;
    height:60px;
    opacity:0;
}

audio{ display:none; }
</style>
</head>

<body>

<div class="space" id="space"></div>
<div id="unlockBtn"></div>

<div class="hud">
    <div id="money">$0</div>
    <button class="btn plus" onclick="changeMoney(1)">+1</button>
    <button class="btn minus" onclick="changeMoney(-1)">-1</button>
</div>

<div id="lockScreen">
    <div id="lockText">ACCESS DENIED</div>
</div>

<!-- SPACE AMBIENT MUSIC -->
<audio id="bgMusic" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2023/06/01/audio_6fd6fc6e0b.mp3?filename=space-ambient-147193.mp3" type="audio/mpeg">
</audio>

<script>
let money = +localStorage.getItem("money") || 0;
let unlocked = localStorage.getItem("unlocked") === "true";
let lockEnd = +localStorage.getItem("lockEnd") || 0;
let wrongStreak = +localStorage.getItem("wrongStreak") || 0;

const moneyEl = document.getElementById("money");
const lockScreen = document.getElementById("lockScreen");
const music = document.getElementById("bgMusic");

/* SOUND SYSTEM */
let audioCtx;

function playSound(type){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    let freq = 300;
    let duration = 0.12;

    switch(type){
        case "click": freq = 300; duration = 0.06; break;
        case "plus": freq = 650; duration = 0.15; break;
        case "minus": freq = 180; duration = 0.15; break;
        case "success": freq = 950; duration = 0.25; break;
        case "error": freq = 110; duration = 0.3; break;
        case "lock": freq = 70; duration = 0.4; break;
    }

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

/* MONEY */
function updateMoney(){
    moneyEl.textContent = "$" + money;
    localStorage.setItem("money", money);
}

function isLocked(){
    return Date.now() < lockEnd;
}

function startLock(sec){
    lockEnd = Date.now() + sec * 1000;
    localStorage.setItem("lockEnd", lockEnd);

    lockScreen.style.display = "flex";
    playSound("lock");

    const t = setInterval(()=>{
        const remaining = Math.max(0, lockEnd - Date.now());

        document.getElementById("lockText").textContent =
            "ACCESS DENIED — " + Math.ceil(remaining / 1000) + "s";

        if(remaining <= 0){
            clearInterval(t);
            lockScreen.style.display = "none";
        }
    },200);
}

function changeMoney(v){
    if(!unlocked){
        playSound("error");
        alert("Unlock first");
        return;
    }

    if(isLocked()) return;

    money += v;
    updateMoney();

    playSound(v > 0 ? "plus" : "minus");
}

/* UNLOCK */
document.getElementById("unlockBtn")
.addEventListener("click", ()=>{

    if(isLocked()) return;

    playSound("click");

    const code = prompt("Access Terminal:");

    if(code === "dysonvacuum6969"){

        unlocked = true;
        localStorage.setItem("unlocked", "true");

        wrongStreak = 0;
        localStorage.setItem("wrongStreak", "0");

        playSound("success");
        alert("ACCESS GRANTED");

        setTimeout(()=>{
            unlocked = false;
            localStorage.setItem("unlocked", "false");
        },10000);

    }else{

        wrongStreak++;
        localStorage.setItem("wrongStreak", wrongStreak);

        playSound("error");

        startLock(10 + (wrongStreak - 1) * 10);
    }

});

/* STARS */
const space = document.getElementById("space");

for(let i=0;i<200;i++){
    const s = document.createElement("div");
    s.className = "star";

    const size = Math.random() * 2 + 1;

    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    s.style.opacity = Math.random()*0.8 + 0.2;
    s.style.animationDuration = (10 + Math.random()*20) + "s";

    space.appendChild(s);
}

/* SPARKLES */
window.addEventListener("click", (e)=>{
    if(e.target.tagName === "BUTTON") return;

    playSound("click");

    for(let i=0;i<6;i++){
        const sp = document.createElement("div");
        sp.className = "sparkle";

        sp.style.left = e.clientX + (Math.random()*30-15) + "px";
        sp.style.top = e.clientY + (Math.random()*30-15) + "px";

        document.body.appendChild(sp);
        setTimeout(()=>sp.remove(),800);
    }
});

/* MUSIC FADE-IN */
window.addEventListener("click", ()=>{
    music.volume = 0;
    music.play().catch(()=>{});

    let vol = 0;

    const fade = setInterval(()=>{
        vol += 0.02;

        if(vol >= 0.45){
            vol = 0.45;
            clearInterval(fade);
        }

        music.volume = vol;
    },100);

},{ once:true });

/* INIT */
if(isLocked()){
    startLock(Math.ceil((lockEnd - Date.now()) / 1000));
}

updateMoney();
</script>

</body>
</html>
