<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Vault</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
    background:#000;
    color:white;
}

.space{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, #1a1f3c, transparent 40%),
        radial-gradient(circle at 80% 70%, #2b0f3a, transparent 45%),
        radial-gradient(circle at center, #050816, #000);
}

.star{
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle,#fff,transparent);
    animation:floatStar linear infinite;
    opacity:.5;
}

@keyframes floatStar{
    from{ transform:translateY(0); opacity:.3; }
    to{ transform:translateY(-120vh); opacity:.8; }
}

.hud{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    padding:45px;
    border-radius:22px;
    background:rgba(10,15,30,.55);
    backdrop-filter:blur(14px);
    box-shadow:0 0 60px rgba(180,200,255,.15);
}

#money{
    font-size:64px;
    margin-bottom:25px;
    text-shadow:0 0 25px rgba(180,220,255,.9);
}

.btn{
    padding:14px 30px;
    margin:10px;
    font-size:18px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    transition:.2s ease;
    font-family:'Orbitron',sans-serif;
}

.plus{
    background:linear-gradient(135deg,#ffd6ff,#caffbf);
    box-shadow:0 0 25px rgba(255,214,255,.5),0 0 45px rgba(202,255,191,.4);
}

.minus{
    background:linear-gradient(135deg,#a0c4ff,#bdb2ff);
    box-shadow:0 0 25px rgba(160,196,255,.5),0 0 45px rgba(189,178,255,.4);
}

.btn:hover{ transform:scale(1.1); filter:brightness(1.2); }

#lockScreen{
    position:fixed;
    inset:0;
    background:rgba(139,0,0,.95);
    display:none;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:600;
    z-index:999;
    text-align:center;
}

.sparkle{
    position:absolute;
    width:10px;
    height:10px;
    background:radial-gradient(circle,white,transparent);
    border-radius:50%;
    pointer-events:none;
    animation:sparkle .8s ease-out forwards;
}

@keyframes sparkle{
    0%{ transform:scale(1); opacity:1; }
    100%{ transform:scale(3); opacity:0; }
}

#unlockBtn{
    position:absolute;
    top:10px;
    right:10px;
    width:60px;
    height:60px;
    opacity:0;
}

audio{ display:none; }
</style>
</head>

<body>

<div class="space" id="space"></div>
<div id="unlockBtn"></div>

<div class="hud">
    <div id="money">$0</div>
    <button class="btn plus" onclick="changeMoney(1)">+1</button>
    <button class="btn minus" onclick="changeMoney(-1)">-1</button>
</div>

<div id="lockScreen">
    <div id="lockText">ACCESS DENIED</div>
</div>

<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b1d3c2.mp3">
</audio>

<script>
let money = +localStorage.getItem("money") || 0;
let unlocked = localStorage.getItem("unlocked") === "true";
let lockEnd = +localStorage.getItem("lockEnd") || 0;
let wrongStreak = +localStorage.getItem("wrongStreak") || 0;

const moneyEl = document.getElementById("money");
const lockScreen = document.getElementById("lockScreen");
const music = document.getElementById("bgMusic");
const hud = document.querySelector(".hud");

let audioCtx;

/* SOUND */
function playSound(type){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    let freq = 300, duration = 0.12;

    switch(type){
        case "click": freq=300; duration=0.06; break;
        case "plus": freq=650; break;
        case "minus": freq=180; break;
        case "success": freq=950; duration=0.25; break;
        case "error": freq=110; duration=0.3; break;
        case "lock": freq=70; duration=0.4; break;
        case "sparkle": freq=1200; duration=0.05; break;
    }

    osc.frequency.value = freq;
    osc.type = "sine";

    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

/* HUD CHECK */
function isOverHUD(x,y){
    const r = hud.getBoundingClientRect();
    return x>=r.left && x<=r.right && y>=r.top && y<=r.bottom;
}

/* SPARKLES */
let last = 0;

window.addEventListener("mousemove",(e)=>{
    if(isOverHUD(e.clientX,e.clientY)) return;

    const now = Date.now();
    if(now - last < 20) return;
    last = now;

    for(let i=0;i<2;i++){
        const sp = document.createElement("div");
        sp.className="sparkle";

        sp.style.left=(e.clientX+(Math.random()*20-10))+"px";
        sp.style.top=(e.clientY+(Math.random()*20-10))+"px";

        document.body.appendChild(sp);
        setTimeout(()=>sp.remove(),800);
    }

    playSound("sparkle");
});

/* CLICK SPARKLES */
window.addEventListener("click",(e)=>{
    if(e.target.tagName==="BUTTON") return;

    playSound("click");

    for(let i=0;i<4;i++){
        const sp=document.createElement("div");
        sp.className="sparkle";

        sp.style.left=(e.clientX+(Math.random()*30-15))+"px";
        sp.style.top=(e.clientY+(Math.random()*30-15))+"px";

        document.body.appendChild(sp);
        setTimeout(()=>sp.remove(),800);
    }
});

/* MUSIC */
window.addEventListener("click",()=>{
    music.volume=1;
    music.play().catch(()=>{});
},{once:true});

/* INIT STARS */
const space=document.getElementById("space");

for(let i=0;i<200;i++){
    const s=document.createElement("div");
    s.className="star";
    const size=Math.random()*2+1;

    s.style.width=size+"px";
    s.style.height=size+"px";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.animationDuration=(10+Math.random()*20)+"s";

    space.appendChild(s);
}
</script>

</body>
</html>
