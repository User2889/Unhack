<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Space Vault Clicker</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
        background: radial-gradient(circle at bottom, #050816, #000);
    }

    /* stars */
    .stars, .stars2, .stars3 {
        position: absolute;
        width: 200%;
        height: 200%;
        background-repeat: repeat;
        background-image: radial-gradient(white 1px, transparent 1px);
        background-size: 50px 50px;
        animation: moveStars 60s linear infinite;
        opacity: 0.3;
    }

    .stars2 { animation-duration: 120s; opacity: 0.2; transform: scale(1.5); }
    .stars3 { animation-duration: 180s; opacity: 0.1; transform: scale(2); }

    @keyframes moveStars {
        from { transform: translateY(0px); }
        to { transform: translateY(-1000px); }
    }

    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    button {
        padding: 15px 25px;
        font-size: 18px;
        margin: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    .plus { background: #00ff99; color: black; }
    .minus { background: #ff4d4d; color: black; }

    #money {
        font-size: 40px;
        margin-bottom: 20px;
    }

    /* invisible unlock button */
    #unlockBtn {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 60px;
        height: 60px;
        opacity: 0;
        cursor: pointer;
    }

    /* lock screen */
    #lockScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        font-size: 24px;
        z-index: 999;
    }
</style>
</head>

<body>

<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<!-- hidden unlock button -->
<div id="unlockBtn"></div>

<div class="center">
    <div id="money">$0</div>
    <button class="plus" onclick="changeMoney(1)">+1</button>
    <button class="minus" onclick="changeMoney(-1)">-1</button>
</div>

<div id="lockScreen">
    <div id="lockText">Locked</div>
</div>

<!-- SPACE AMBIENT MUSIC -->
<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b1d3c2.mp3" type="audio/mpeg">
</audio>

<script>
let money = parseInt(localStorage.getItem("money")) || 0;
let unlocked = localStorage.getItem("unlocked") === "true";
let lockEnd = parseInt(localStorage.getItem("lockEnd")) || 0;
let wrongStreak = parseInt(localStorage.getItem("wrongStreak")) || 0;

const moneyEl = document.getElementById("money");
const lockScreen = document.getElementById("lockScreen");
const music = document.getElementById("bgMusic");

function updateMoney() {
    moneyEl.textContent = "$" + money;
    localStorage.setItem("money", money);
}

function isLocked() {
    return Date.now() < lockEnd;
}

function startLock(seconds) {
    lockEnd = Date.now() + seconds * 1000;
    localStorage.setItem("lockEnd", lockEnd);
    lockScreen.style.display = "flex";

    const interval = setInterval(() => {
        let remaining = Math.max(0, lockEnd - Date.now());
        document.getElementById("lockText").textContent =
            "Locked for " + Math.ceil(remaining / 1000) + "s";

        if (remaining <= 0) {
            clearInterval(interval);
            lockScreen.style.display = "none";
        }
    }, 500);
}

// start music after first interaction (browser requirement)
function startMusic() {
    music.volume = 0.4;
    music.play().catch(() => {});
    window.removeEventListener("click", startMusic);
}
window.addEventListener("click", startMusic);

function changeMoney(val) {
    if (!unlocked) {
        alert("You need to unlock first!");
        return;
    }

    if (isLocked()) return;

    money += val;
    updateMoney();
}

// hidden unlock system
document.getElementById("unlockBtn").addEventListener("click", () => {
    if (isLocked()) return;

    const input = prompt("Enter code:");

    if (input === "dysonvacuum6969") {
        unlocked = true;
        localStorage.setItem("unlocked", "true");
        wrongStreak = 0;
        localStorage.setItem("wrongStreak", "0");
        alert("Unlocked!");
    } else {
        wrongStreak++;
        localStorage.setItem("wrongStreak", wrongStreak);

        let penalty = 10 + (wrongStreak - 1) * 10;
        startLock(penalty);
    }
});

// restore lock state
if (isLocked()) {
    startLock(Math.ceil((lockEnd - Date.now()) / 1000));
}

updateMoney();
</script>

</body>
</html>
