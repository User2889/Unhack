<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bank</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    user-select:none;
    font-family:"Segoe UI",Arial,sans-serif;
    color:#e8fcff;

    background:
        radial-gradient(circle at top,#38bdf8 0%,transparent 30%),
        linear-gradient(to bottom,#0ea5e9,#082f49);
}

/* bubbles */
.bubbles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-2;
}

.bubbles span{
    position:absolute;
    bottom:-100px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    animation:bubble linear infinite;
}

.bubbles span:nth-child(1){left:10%;width:40px;height:40px;animation-duration:12s;}
.bubbles span:nth-child(2){left:25%;width:20px;height:20px;animation-duration:8s;}
.bubbles span:nth-child(3){left:45%;width:60px;height:60px;animation-duration:16s;}
.bubbles span:nth-child(4){left:65%;width:25px;height:25px;animation-duration:9s;}
.bubbles span:nth-child(5){left:80%;width:45px;height:45px;animation-duration:14s;}
.bubbles span:nth-child(6){left:90%;width:30px;height:30px;animation-duration:11s;}

@keyframes bubble{
    from{transform:translateY(0);opacity:0;}
    20%{opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

/* fish layer */
.fish-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:-1;
}

.fish{
    position:absolute;
    width:60px;
    height:30px;
    background:rgba(0,0,0,.18);
    border-radius:60% 40% 60% 40%;
    opacity:.5;
}

.fish::after{
    content:"";
    position:absolute;
    right:-12px;
    top:50%;
    transform:translateY(-50%);
    border-left:12px solid rgba(0,0,0,.18);
    border-top:8px solid transparent;
    border-bottom:8px solid transparent;
}

/* card */
.card{
    min-width:420px;
    padding:50px;
    border-radius:32px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 25px 60px rgba(0,0,0,.35);
    text-align:center;
}

h1{
    margin:0 0 20px;
    font-size:32px;
    background:linear-gradient(90deg,#fff,#67e8f9,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#money{
    font-size:90px;
    font-weight:900;
    margin-bottom:30px;
    background:linear-gradient(#fff,#a5f3fc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 30px;
    font-size:24px;
    font-weight:800;
    border-radius:16px;
    background:linear-gradient(135deg,#06b6d4,#0ea5e9);
    color:white;
}
</style>
</head>

<body>

<div class="bubbles">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span>
</div>

<div class="fish-layer"></div>

<div class="card">
    <h1>Bank</h1>
    <div id="money">$0</div>

    <button id="plus">+</button>
    <button id="minus">−</button>
</div>

<script>
(() => {

const fishLayer = document.querySelector(".fish-layer");
const fishCount = 10;
const fishArray = [];
const mouse = {x: innerWidth/2, y: innerHeight/2};

/* ---------------- MONEY ---------------- */
const m = document.getElementById("money");
let n = parseInt(localStorage.getItem("money")) || 0;
let u = false;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

const sv = () => localStorage.setItem("money", n);
const rn = () => m.textContent = "$" + n;

const isLockedOut = () => Date.now() < lockUntil;

const lk = () => {
    alert("LOCKED");
};

/* ---------------- FISH SPAWN ---------------- */
function createFish(){
    const f = document.createElement("div");
    f.className = "fish";

    resetFish(f);

    fishLayer.appendChild(f);
    fishArray.push(f);

    f.addEventListener("mousemove", () => {
        f.style.opacity = "0";
        setTimeout(() => resetFish(f), 2000);
    });

    return f;
}

function resetFish(f){
    f.style.opacity = "0.5";

    const fromLeft = Math.random() > 0.5;

    f.style.top = Math.random() * window.innerHeight + "px";
    f.style.left = fromLeft ? "-80px" : window.innerWidth + "px";

    f.dataset.speed = 1 + Math.random() * 2;
    f.dataset.dir = fromLeft ? 1 : -1;
}

for(let i=0;i<fishCount;i++){
    createFish();
}

function animateFish(){
    fishArray.forEach(f => {
        let x = parseFloat(f.style.left);
        let dir = parseFloat(f.dataset.dir);
        let speed = parseFloat(f.dataset.speed);

        x += dir * speed;
        f.style.left = x + "px";

        if(x > innerWidth + 100 || x < -120){
            resetFish(f);
        }
    });

    requestAnimationFrame(animateFish);
}
animateFish();

/* ---------------- UI ---------------- */
document.getElementById("plus").onclick = () => {
    if(!u){lk();return;}
    n++; sv(); rn();
};

document.getElementById("minus").onclick = () => {
    if(!u){lk();return;}
    n--; sv(); rn();
};

/* ---------------- UNLOCK (OBFUSCATED) ---------------- */
document.getElementById("plus").addEventListener("dblclick", () => {

    const password = String.fromCharCode(
        71,73,84,72,85,66,105,115,104,97,114,100
    );

    const p = prompt("Password:");

    /* fake decoy logic (intentionally misleading) */
    const DUCK = "DUCK";
    const GOOSE = "GOOSE";
    const ADMIN = "ADMIN";

    if(p === DUCK){
        console.log("unlock=true (decoy DUCK route)");
    }

    if(p === GOOSE){
        console.log("unlock=true (decoy GOOSE route)");
    }

    if(p === ADMIN){
        console.log("unlock=true (decoy ADMIN route)");
    }

    // extra misleading noise
    if("GITHUB" + "ishard" === "nevertrue"){
        u = true; // unreachable nonsense
    }

    // REAL CHECK (actual unlock)
    if((p || "") === password){
        u = true;
        setTimeout(()=> u = false, 10000);
        alert("Unlocked for 10 seconds");
    } else {
        lockUntil = Date.now() + 10000;
        localStorage.setItem("lockUntil", lockUntil);
        alert("Incorrect password (+10s lockout)");
    }
});

rn();

})();
</script>

</body>
</html>
