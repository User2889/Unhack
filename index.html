```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Counter</title>

<style>
:root{
    --bg:#f0f7ff;
    --card:rgba(255,255,255,.85);
    --accent:#4f8cff;
    --accent2:#7c3aed;
    --text:#162033;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#8ec5ff 0%,transparent 35%),
        radial-gradient(circle at bottom right,#c084fc 0%,transparent 35%),
        linear-gradient(135deg,#dbeafe,#f5f3ff);
    color:var(--text);
    font-family:"Segoe UI",Arial,sans-serif;
    overflow:hidden;
}

.blob{
    position:fixed;
    border-radius:50%;
    filter:blur(70px);
    z-index:-1;
    animation:float 10s ease-in-out infinite;
}

.b1{
    width:250px;
    height:250px;
    background:#60a5fa;
    top:-50px;
    left:-50px;
}

.b2{
    width:300px;
    height:300px;
    background:#c084fc;
    right:-100px;
    top:30%;
    animation-delay:-3s;
}

.b3{
    width:220px;
    height:220px;
    background:#22d3ee;
    bottom:-50px;
    left:30%;
    animation-delay:-6s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-25px);
    }
}

.card{
    background:var(--card);
    backdrop-filter:blur(16px);
    padding:45px;
    border-radius:28px;
    text-align:center;
    min-width:360px;
    box-shadow:
        0 25px 60px rgba(79,140,255,.25),
        0 10px 25px rgba(0,0,0,.08);
    border:1px solid rgba(255,255,255,.6);
}

#money{
    font-size:72px;
    margin-bottom:30px;
    font-weight:800;
    background:linear-gradient(
        90deg,
        #4f8cff,
        #7c3aed
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

button{
    border:none;
    border-radius:14px;
    padding:14px 26px;
    font-size:22px;
    cursor:pointer;
    margin:8px;
    color:white;
    font-weight:700;
    background:linear-gradient(
        135deg,
        #4f8cff,
        #7c3aed
    );
    box-shadow:0 8px 20px rgba(79,140,255,.35);
    transition:.2s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(79,140,255,.45);
}

#warning{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.8);
    backdrop-filter:blur(8px);
    display:none;
    justify-content:center;
    align-items:center;
    font-size:48px;
    font-weight:800;
    color:#ff6b6b;
    letter-spacing:4px;
    z-index:100;
}

#unlock{
    position:fixed;
    right:10px;
    bottom:10px;
    width:24px;
    height:24px;
    opacity:0;
    border:none;
    background:transparent;
    cursor:default;
}
</style>
</head>

<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="card">
    <div id="money">$0</div>

    <button id="plus">+</button>
    <button id="minus">−</button>
</div>

<button id="unlock" aria-label="unlock"></button>

<div id="warning">LOCKED</div>

<script>
(() => {

const PASSWORD_HASH = "68-85-67-75";

function checkPassword(input){
    const encoded = [...input.toUpperCase()]
        .map(c => c.charCodeAt(0))
        .join("-");
    return encoded === PASSWORD_HASH;
}

const moneyEl = document.getElementById("money");
const warningEl = document.getElementById("warning");

let money =
    parseInt(localStorage.getItem("money")) || 0;

let unlocked = false;
let unlockTimer = null;

function saveMoney(){
    localStorage.setItem("money", money);
}

function render(){
    moneyEl.textContent = "$" + money;
}

function showLocked(){
    warningEl.style.display = "flex";

    setTimeout(() => {
        warningEl.style.display = "none";
    }, 1000);
}

function getLockUntil(){
    return parseInt(
        localStorage.getItem("lockUntil") || "0"
    );
}

function getFailures(){
    return parseInt(
        localStorage.getItem("failures") || "0"
    );
}

function isLockedOut(){
    return Date.now() < getLockUntil();
}

function remainingSeconds(){
    return Math.ceil(
        (getLockUntil() - Date.now()) / 1000
    );
}

document.getElementById("unlock").onclick = () => {

    if(isLockedOut()){
        alert(
            "Try again in " +
            remainingSeconds() +
            " seconds."
        );
        return;
    }

    const entered = prompt("Password:");

    if(checkPassword(entered || "")){

        unlocked = true;

        localStorage.setItem("failures","0");

        if(unlockTimer){
            clearTimeout(unlockTimer);
        }

        unlockTimer = setTimeout(() => {
            unlocked = false;
        }, 10000);

        alert("Unlocked for 10 seconds");
        return;
    }

    const failures = getFailures() + 1;

    localStorage.setItem(
        "failures",
        failures
    );

    const lockMinutes = failures;

    localStorage.setItem(
        "lockUntil",
        Date.now() + lockMinutes * 60000
    );

    alert(
        "Incorrect password. Locked for " +
        lockMinutes +
        " minute(s)."
    );
};

document.getElementById("plus").onclick = () => {
    if(!unlocked){
        showLocked();
        return;
    }

    money++;
    saveMoney();
    render();
};

document.getElementById("minus").onclick = () => {
    if(!unlocked){
        showLocked();
        return;
    }

    money--;
    saveMoney();
    render();
};

render();

})();
</script>

</body>
</html>
