<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Space Vault</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body {
    margin: 0;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: white;
}

/* SPACE BACKGROUND */
.space {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 30%, #1a1f3c, transparent 40%),
                radial-gradient(circle at 80% 70%, #2b0f3a, transparent 45%),
                radial-gradient(circle at center, #050816, #000);
}

/* STARS */
.star {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #fff, transparent);
    animation: floatStar linear infinite;
    opacity: 0.5;
}

@keyframes floatStar {
    from { transform: translateY(0); opacity: 0.3; }
    to { transform: translateY(-120vh); opacity: 0.8; }
}

/* HUD */
.hud {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    padding: 45px;
    border-radius: 22px;
    background: rgba(10, 15, 30, 0.55);
    backdrop-filter: blur(14px);
    box-shadow: 0 0 60px rgba(180, 200, 255, 0.15);
}

/* MONEY */
#money {
    font-size: 64px;
    margin-bottom: 25px;
    text-shadow: 0 0 25px rgba(180, 220, 255, 0.9);
}

/* PASTEL SPACE BUTTONS */
.btn {
    padding: 14px 30px;
    margin: 10px;
    font-size: 18px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    transition: 0.2s ease;
    font-family: 'Orbitron', sans-serif;
}

.plus {
    background: linear-gradient(135deg, #ffd6ff, #caffbf);
    box-shadow: 0 0 25px rgba(255, 214, 255, 0.5),
                0 0 45px rgba(202, 255, 191, 0.4);
}

.minus {
    background: linear-gradient(135deg, #a0c4ff, #bdb2ff);
    box-shadow: 0 0 25px rgba(160, 196, 255, 0.5),
                0 0 45px rgba(189, 178, 255, 0.4);
}

.btn:hover {
    transform: scale(1.1);
    filter: brightness(1.2);
}

/* LOCK SCREEN */
#lockScreen {
    position: fixed;
    inset: 0;
    background: rgba(139,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 600;
    z-index: 999;
    text-align: center;
    color: white;
}

/* SPARKLES */
.sparkle {
    position: absolute;
    width: 10px;
    height: 10px;
    background: radial-gradient(circle, white, transparent);
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle 0.8s ease-out forwards;
}

@keyframes sparkle {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
}

/* HIDDEN UNLOCK BUTTON */
#unlockBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 60px;
    height: 60px;
    opacity: 0;
}

audio { display:none; }
</style>
</head>

<body>
<div class="space" id="space"></div>
<div id="unlockBtn"></div>

<div class="hud">
    <div id="money">$0</div>
    <button class="btn plus" onclick="changeMoney(1)">+1</button>
    <button class="btn minus" onclick="changeMoney(-1)">-1</button>
</div>

<div id="lockScreen">
    <div id="lockText">ACCESS DENIED</div>
</div>

<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b1d3c2.mp3">
</audio>

<script>
let money = +localStorage.getItem("money") || 0;
let unlocked = localStorage.getItem("unlocked") === "true";
let lockEnd = +localStorage.getItem("lockEnd") || 0;
let wrongStreak = +localStorage.getItem("wrongStreak") || 0;

const moneyEl = document.getElementById("money");
const lockScreen = document.getElementById("lockScreen");
const music = document.getElementById("bgMusic");

function updateMoney(){
    moneyEl.textContent = "$" + money;
    localStorage.setItem("money", money);
}

function isLocked(){
    return Date.now() < lockEnd;
}

function startLock(sec){
    lockEnd = Date.now() + sec*1000;
    localStorage.setItem("lockEnd", lockEnd);

    lockScreen.style.display = "flex";

    const t = setInterval(()=>{
        let r = Math.max(0, lockEnd - Date.now());
        document.getElementById("lockText").textContent =
        "ACCESS DENIED — " + Math.ceil(r/1000) + "s";

        if(r<=0){
            clearInterval(t);
            lockScreen.style.display="none";
        }
    },200);
}

function changeMoney(v){
    if(!unlocked) return alert("ACCESS DENIED");
    if(isLocked()) return;
    money += v;
    updateMoney();
}

document.getElementById("unlockBtn").addEventListener("click", ()=>{
    if(isLocked()) return;

    const code = prompt("Access Terminal:");

    if(code === "dysonvacuum6969"){
        unlocked = true;
        localStorage.setItem("unlocked","true");
        wrongStreak = 0;
        localStorage.setItem("wrongStreak","0");
        alert("ACCESS GRANTED");
    } else {
        wrongStreak++;
        localStorage.setItem("wrongStreak", wrongStreak);
        startLock(10 + (wrongStreak-1)*10);
    }
});

/* STARS */
const space = document.getElementById("space");

for(let i=0;i<200;i++){
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random()*2 + 1;
    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    s.style.opacity = Math.random()*0.8 + 0.2;
    s.style.animationDuration = (10 + Math.random()*20) + "s"; // slower
    space.appendChild(s);
}

/* SPARKLES */
window.addEventListener("click",(e)=>{
    if(e.target.tagName==="BUTTON") return;

    for(let i=0;i<6;i++){
        const sp = document.createElement("div");
        sp.className = "sparkle";
        sp.style.left = e.clientX + (Math.random()*30-15)+"px";
        sp.style.top = e.clientY + (Math.random()*30-15)+"px";
        document.body.appendChild(sp);
        setTimeout(()=>sp.remove(),800);
    }
});

/* MUSIC */
window.addEventListener("click", ()=>{
    music.volume = 0.3;
    music.play().catch(()=>{});
},{once:true});

/* INIT */
if(isLocked()) startLock(Math.ceil((lockEnd-Date.now())/1000));
updateMoney();
</script>
</body>
</html>
