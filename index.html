<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Counter</title>

<style>
:root{
    --bg:#121826;
    --card:#1c2436;
    --accent:#4f8cff;
    --text:#f5f7ff;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:var(--text);
    font-family:Arial,sans-serif;
}

.card{
    background:var(--card);
    padding:40px;
    border-radius:20px;
    text-align:center;
    min-width:320px;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

#money{
    font-size:64px;
    margin-bottom:25px;
    font-weight:bold;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 22px;
    font-size:18px;
    cursor:pointer;
    margin:5px;
    background:var(--accent);
    color:white;
}

button:hover{
    filter:brightness(1.1);
}

#warning{
    position:fixed;
    inset:0;
    background:rgba(255,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
    font-size:42px;
    font-weight:bold;
    z-index:100;
}

#unlock{
    position:fixed;
    right:8px;
    bottom:8px;
    width:18px;
    height:18px;
    opacity:.08;
    border-radius:50%;
    background:white;
}
</style>
</head>
<body>

<div class="card">
    <div id="money">$0</div>

    <button id="plus">+</button>
    <button id="minus">-</button>
</div>

<button id="unlock" aria-label="unlock"></button>

<div id="warning">LOCKED</div>

<script>
(() => {

const PASSWORD = "replace-with-your-password";

const moneyEl = document.getElementById("money");
const warningEl = document.getElementById("warning");

let money =
    parseInt(localStorage.getItem("money")) || 0;

let unlocked = false;

function saveMoney(){
    localStorage.setItem("money", money);
}

function render(){
    moneyEl.textContent = "$" + money;
}

function showLocked(){
    warningEl.style.display = "flex";
    setTimeout(() => {
        warningEl.style.display = "none";
    }, 1000);
}

function getLockUntil(){
    return parseInt(
        localStorage.getItem("lockUntil") || "0"
    );
}

function getFailures(){
    return parseInt(
        localStorage.getItem("failures") || "0"
    );
}

function isLockedOut(){
    return Date.now() < getLockUntil();
}

function remainingSeconds(){
    return Math.ceil(
        (getLockUntil() - Date.now()) / 1000
    );
}

document.getElementById("unlock").onclick = () => {

    if(isLockedOut()){
        alert(
            "Try again in " +
            remainingSeconds() +
            " seconds."
        );
        return;
    }

    const entered = prompt("Password:");

    if(entered === PASSWORD){
        unlocked = true;
        localStorage.setItem("failures","0");
        alert("Unlocked");
        return;
    }

    const failures = getFailures() + 1;

    localStorage.setItem(
        "failures",
        failures
    );

    const lockMinutes = failures;

    localStorage.setItem(
        "lockUntil",
        Date.now() + lockMinutes * 60000
    );

    alert(
        "Incorrect password. Locked for " +
        lockMinutes +
        " minute(s)."
    );
};

document.getElementById("plus").onclick = () => {
    if(!unlocked){
        showLocked();
        return;
    }

    money++;
    saveMoney();
    render();
};

document.getElementById("minus").onclick = () => {
    if(!unlocked){
        showLocked();
        return;
    }

    money--;
    saveMoney();
    render();
};

render();

})();
</script>

</body>
</html>
