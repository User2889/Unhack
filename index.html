<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank money</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
    background:#000;
    color:white;
}

/* UPDATED BACKGROUND ONLY */
.space {
    position: fixed;
    inset: 0;
    background: black;
    overflow: hidden;
}

.hud{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    padding:45px;
    border-radius:22px;
    background:rgba(10,15,30,.55);
    backdrop-filter:blur(14px);
    box-shadow:0 0 60px rgba(180,200,255,.15);
}

#money{
    font-size:64px;
    margin-bottom:25px;
    text-shadow:0 0 25px rgba(180,220,255,.9);
}

.btn{
    padding:14px 30px;
    margin:10px;
    font-size:18px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    transition:.2s ease;
    font-family:'Orbitron',sans-serif;
}

.plus{
    background:linear-gradient(135deg,#ffd6ff,#caffbf);
    box-shadow:0 0 25px rgba(255,214,255,.5),0 0 45px rgba(202,255,191,.4);
}

.minus{
    background:linear-gradient(135deg,#a0c4ff,#bdb2ff);
    box-shadow:0 0 25px rgba(160,196,255,.5),0 0 45px rgba(189,178,255,.4);
}

.btn:hover{ transform:scale(1.1); filter:brightness(1.2); }

#lockScreen{
    position:fixed;
    inset:0;
    background:rgba(139,0,0,.95);
    display:none;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:600;
    z-index:999;
    text-align:center;
    animation: none;
}

#lockScreen.active{
    display:flex;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:0.6;}
    50%{opacity:1;}
    100%{opacity:0.6;}
}

.sparkle{
    position:absolute;
    width:10px;
    height:10px;
    background:radial-gradient(circle,white,transparent);
    border-radius:50%;
    pointer-events:none;
    animation:sparkle .8s ease-out forwards;
}

@keyframes sparkle{
    0%{ transform:scale(1); opacity:1; }
    100%{ transform:scale(3); opacity:0; }
}

#unlockBtn{
    position:absolute;
    top:10px;
    right:10px;
    width:60px;
    height:60px;
    opacity:0;
    z-index:1000;
}

audio{ display:none; }
</style>
</head>

<body>

<div class="space" id="space"></div>
<div id="unlockBtn"></div>

<div class="hud">
    <div id="money">$0</div>
    <button class="btn plus" onclick="changeMoney(1)">+1</button>
    <button class="btn minus" onclick="changeMoney(-1)">-1</button>
</div>

<div id="lockScreen">
    <div id="lockText">ACCESS DENIED</div>
</div>

<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b1d3c2.mp3">
</audio>

<script>
let money = +localStorage.getItem("money") || 0;
let unlockedUntil = +localStorage.getItem("unlockedUntil") || 0;
let lockUntil = +localStorage.getItem("lockUntil") || 0;
let wrongStreak = +localStorage.getItem("wrongStreak") || 0;

const CODE = "QUACKYduck";

const moneyEl = document.getElementById("money");
const lockScreen = document.getElementById("lockScreen");
const music = document.getElementById("bgMusic");
const hud = document.querySelector(".hud");
const unlockBtn = document.getElementById("unlockBtn");

let audioCtx;

/* sparkle control */
let sparkleStart = 0;
let sparkleArmed = true;
let idleTimer;

/* LOCK TIMER */
let lockInterval;

/* SOUND */
function playSound(type){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(type === "sparkle"){
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();

        o.type = "square";
        o.frequency.value = 2200 + Math.random()*800;

        o.connect(g);
        g.connect(audioCtx.destination);

        const t = audioCtx.currentTime;

        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);

        o.start(t);
        o.stop(t + 0.03);
        return;
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    let freq = 300, duration = 0.12, typeWave = "sine";

    switch(type){
        case "click": freq=300; duration=0.06; break;
        case "plus": freq=650; break;
        case "minus": freq=180; break;
        case "success": freq=950; duration=0.25; break;
        case "error": freq=110; duration=0.3; break;
        case "lock": freq=70; duration=0.4; break;
    }

    osc.frequency.value = freq;
    osc.type = typeWave;

    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

/* LOCK HANDLER WITH TIMER */
function updateLock(){
    const now = Date.now();

    if(now < lockUntil){
        const secs = Math.ceil((lockUntil - now)/1000);
        lockScreen.classList.add("active");
        document.getElementById("lockText").innerText = `ACCESS DENIED - ${secs}s`;

        if(!lockInterval){
            lockInterval = setInterval(updateLock, 250);
        }
        return true;
    }

    lockScreen.classList.remove("active");

    if(lockInterval){
        clearInterval(lockInterval);
        lockInterval = null;
    }

    return false;
}

/* MONEY */
function changeMoney(amount){
    const now = Date.now();

    if(updateLock()) return;

    if(now > unlockedUntil){
        alert("Unlock first!");
        playSound("error");
        return;
    }

    money += amount;
    moneyEl.textContent = `$${money}`;
    localStorage.setItem("money",money);
    playSound(amount>0 ? "plus" : "minus");
}

/* UNLOCK */
unlockBtn.addEventListener("click", ()=>{
    if(updateLock()) return;

    const code = prompt("ENTER CODE");

    if(code === CODE){
        wrongStreak = 0;
        localStorage.setItem("wrongStreak", wrongStreak);

        const duration = 10000;
        unlockedUntil = Date.now() + duration;
        localStorage.setItem("unlockedUntil", unlockedUntil);

        playSound("success");
    } else {
        wrongStreak++;
        localStorage.setItem("wrongStreak", wrongStreak);

        const lockTime = wrongStreak * 10000;
        lockUntil = Date.now() + lockTime;
        localStorage.setItem("lockUntil", lockUntil);

        document.getElementById("lockText").innerText = "ACCESS DENIED";
        lockScreen.classList.add("active");

        playSound("error");
    }
});

/* INIT */
moneyEl.textContent = `$${money}`;
updateLock();

/* REALISTIC STARFIELD BACKGROUND */
const space = document.getElementById("space");
const canvas = document.createElement("canvas");
space.appendChild(canvas);

const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

const stars = [];
const STAR_COUNT = 220;

for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * canvas.width,
        size: Math.random() * 1.8 + 0.3,
        speed: Math.random() * 0.02 + 0.01
    });
}

function animateStars() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let star of stars) {
        star.z -= star.speed * 120;

        if (star.z <= 0) {
            star.z = canvas.width;
            star.x = Math.random() * canvas.width;
            star.y = Math.random() * canvas.height;
        }

        const k = 128 / star.z;
        const x = (star.x - canvas.width / 2) * k + canvas.width / 2;
        const y = (star.y - canvas.height / 2) * k + canvas.height / 2;
        const size = star.size * k;

        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    }

    requestAnimationFrame(animateStars);
}

animateStars();

window.addEventListener("resize", resize);

/* SPARKLES CONTROLLED */
window.addEventListener("mousemove",(e)=>{
    const now = Date.now();

    if(updateLock()) return;
    if(now < lockUntil) return;

    if(e.target.closest(".hud")) return;

    clearTimeout(idleTimer);
    idleTimer = setTimeout(()=>{
        sparkleStart = 0;
        sparkleArmed = true;
    }, 500);

    if(!sparkleArmed) return;

    if(sparkleStart === 0) sparkleStart = now;

    if(now - sparkleStart > 2500){
        sparkleArmed = false;
        return;
    }

    for(let i=0;i<2;i++){
        const sp = document.createElement("div");
        sp.className="sparkle";
        sp.style.left=(e.clientX+(Math.random()*20-10))+"px";
        sp.style.top=(e.clientY+(Math.random()*20-10))+"px";
        document.body.appendChild(sp);
        setTimeout(()=>sp.remove(),800);
    }

    playSound("sparkle");
});
</script>
</body>
</html>
