<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>🌊 Ocean Bank</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    user-select:none;
    font-family:"Segoe UI",Arial,sans-serif;
    color:#e8fcff;

    background:
        radial-gradient(circle at top,#38bdf8 0%,transparent 30%),
        linear-gradient(
            to bottom,
            #0ea5e9 0%,
            #0284c7 20%,
            #0369a1 45%,
            #0c4a6e 70%,
            #082f49 100%
        );
}

/* light rays */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        115deg,
        rgba(255,255,255,.06) 0px,
        rgba(255,255,255,.06) 2px,
        transparent 2px,
        transparent 120px
    );
    opacity:.25;
    pointer-events:none;
}

/* bubbles */
.bubbles{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:-2;
}

.bubbles span{
    position:absolute;
    bottom:-100px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    animation:bubble linear infinite;
}

.bubbles span:nth-child(1){left:10%;width:40px;height:40px;animation-duration:12s;}
.bubbles span:nth-child(2){left:25%;width:20px;height:20px;animation-duration:8s;}
.bubbles span:nth-child(3){left:45%;width:60px;height:60px;animation-duration:16s;}
.bubbles span:nth-child(4){left:65%;width:25px;height:25px;animation-duration:9s;}
.bubbles span:nth-child(5){left:80%;width:45px;height:45px;animation-duration:14s;}
.bubbles span:nth-child(6){left:90%;width:30px;height:30px;animation-duration:11s;}

@keyframes bubble{
    from{transform:translateY(0);opacity:0;}
    20%{opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

/* seaweed */
.seaweed{
    position:fixed;
    bottom:-20px;
    left:0;
    width:100%;
    height:220px;
    pointer-events:none;
    z-index:-1;

    background:
        radial-gradient(ellipse at 10% 100%, rgba(0,0,0,.35) 0 30px, transparent 31px),
        radial-gradient(ellipse at 25% 100%, rgba(0,0,0,.25) 0 40px, transparent 41px),
        radial-gradient(ellipse at 45% 100%, rgba(0,0,0,.3) 0 35px, transparent 36px),
        radial-gradient(ellipse at 65% 100%, rgba(0,0,0,.28) 0 45px, transparent 46px),
        radial-gradient(ellipse at 85% 100%, rgba(0,0,0,.22) 0 38px, transparent 39px);

    opacity:.6;
    animation:sway 6s ease-in-out infinite alternate;
}

/* 🌿 CORALS */
.corals{
    position:fixed;
    bottom:0;
    width:100%;
    height:140px;
    pointer-events:none;
    z-index:-1;
}

.corals div{
    position:absolute;
    bottom:0;
    width:18px;
    background:linear-gradient(#ff7aa2,#ff3d7f);
    border-radius:10px;
    opacity:.75;
}

.corals div:nth-child(1){left:15%;height:90px;transform:rotate(-10deg);}
.corals div:nth-child(2){left:22%;height:60px;transform:rotate(12deg);}
.corals div:nth-child(3){left:30%;height:110px;transform:rotate(-6deg);}
.corals div:nth-child(4){left:68%;height:80px;transform:rotate(8deg);}
.corals div:nth-child(5){left:75%;height:100px;transform:rotate(-14deg);}
.corals div:nth-child(6){left:82%;height:70px;transform:rotate(10deg);}

@keyframes sway{
    from{transform:skewX(-2deg) translateX(-5px);}
    to{transform:skewX(2deg) translateX(5px);}
}

/* fish */
.fish-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-1;
    overflow:hidden;
}

.fish-layer span{
    position:absolute;
    width:60px;
    height:30px;

    background:rgba(0,0,0,.18);
    border-radius:60% 40% 60% 40%;

    opacity:.5;
    transition:transform .08s ease-out;
}

.fish-layer span::after{
    content:"";
    position:absolute;
    right:-12px;
    top:50%;
    transform:translateY(-50%);
    border-left:12px solid rgba(0,0,0,.18);
    border-top:8px solid transparent;
    border-bottom:8px solid transparent;
}

.fish-layer span:nth-child(1){top:20%;left:10%; animation:drift1 18s linear infinite;}
.fish-layer span:nth-child(2){top:40%;left:20%; animation:drift2 24s linear infinite;}
.fish-layer span:nth-child(3){top:65%;left:5%; animation:drift3 20s linear infinite;}
.fish-layer span:nth-child(4){top:80%;left:15%; animation:drift4 28s linear infinite;}

@keyframes drift1{0%{transform:translateX(-20vw);}100%{transform:translateX(120vw);}}
@keyframes drift2{0%{transform:translateX(-30vw);}100%{transform:translateX(130vw);}}
@keyframes drift3{0%{transform:translateX(-25vw);}100%{transform:translateX(125vw);}}
@keyframes drift4{0%{transform:translateX(-35vw);}100%{transform:translateX(135vw);}}

/* card */
.card{
    min-width:420px;
    padding:50px;
    border-radius:32px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 25px 60px rgba(0,0,0,.35);

    text-align:center;
}

h1{
    margin:0 0 20px;
    font-size:32px;

    background:linear-gradient(90deg,#fff,#67e8f9,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#money{
    font-size:90px;
    font-weight:900;
    margin-bottom:30px;

    background:linear-gradient(#fff,#a5f3fc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 30px;
    font-size:24px;
    font-weight:800;
    border-radius:16px;

    background:linear-gradient(135deg,#06b6d4,#0ea5e9);
    color:white;
}

#warning{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.6);
    color:#ff8080;
    font-size:48px;
    font-weight:900;
    z-index:999;
}

#unlock{
    position:fixed;
    right:10px;
    bottom:10px;
    width:24px;
    height:24px;
    opacity:0;
}
</style>
</head>

<body>

<div class="bubbles">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span>
</div>

<div class="seaweed"></div>
<div class="corals">
  <div></div><div></div><div></div><div></div><div></div><div></div>
</div>

<div class="fish-layer">
  <span></span><span></span><span></span><span></span>
</div>

<div class="card">
    <h1>Ocean Bank</h1>
    <div id="money">$0</div>

    <button id="plus">+</button>
    <button id="minus">−</button>
</div>

<button id="unlock"></button>
<div id="warning">LOCKED</div>

<script>
(()=>{

const m=document.getElementById("money");
const w=document.getElementById("warning");

let n=parseInt(localStorage.getItem("money"))||0;
let u=false;

/* persistent lockout */
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0;

const isLockedOut=()=>Date.now()<lockUntil;

const sv=()=>localStorage.setItem("money",n);
const rn=()=>m.textContent="$"+n;

const lk=()=>{
    w.style.display="flex";
    setTimeout(()=>w.style.display="none",1000);
};

/* unlock button */
document.getElementById("unlock").onclick=()=>{

    if(isLockedOut()){
        const left=Math.ceil((lockUntil-Date.now())/1000);
        alert("Locked out for "+left+"s");
        return;
    }

    const p=prompt("Password:");

    if((p||"").toLowerCase()==="githubishard"){
        u=true;
        setTimeout(()=>u=false,10000);
        alert("Unlocked for 10 seconds");
    }else{
        lockUntil=Date.now()+10000;
        localStorage.setItem("lockUntil",lockUntil);
        alert("Incorrect password (+10s lockout)");
    }
};

/* counter */
document.getElementById("plus").onclick=()=>{
    if(!u){lk();return;}
    n++;sv();rn();
};

document.getElementById("minus").onclick=()=>{
    if(!u){lk();return;}
    n--;sv();rn();
};

/* fish mouse reaction (STRONGER) */
const fish=document.querySelectorAll(".fish-layer span");
let mouse={x:innerWidth/2,y:innerHeight/2};

window.addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

function animateFish(){
    fish.forEach(f=>{
        const r=f.getBoundingClientRect();
        const fx=r.left+r.width/2;
        const fy=r.top+r.height/2;

        const dx=fx-mouse.x;
        const dy=fy-mouse.y;

        const dist=Math.sqrt(dx*dx+dy*dy);

        let power=0;
        if(dist<220) power=(220-dist)/220;

        const angle=Math.atan2(dy,dx);

        const x=Math.cos(angle)*power*80;
        const y=Math.sin(angle)*power*80;

        f.style.transform=`translate(${x}px,${y}px)`;
    });

    requestAnimationFrame(animateFish);
}
animateFish();

/* restore lockout on refresh */
if(isLockedOut()){
    console.log("Lockout active for",lockUntil-Date.now(),"ms");
}

rn();

})();
</script>

</body>
</html>
